<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calorie Tracker</title>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface2: #21262d;
            --border: #30363d;
            --border2: #484f58;
            --text: #c9d1d9;
            --muted: #8b949e;
            --muted2: #6e7681;
            --accent: #58a6ff;
            --accent2: #79c0ff;
            --success: #3fb950;
            --warning: #d29922;
            --error: #f85149;
            --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, Courier, monospace;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: var(--font-sans);
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
        }
        
        header {
            text-align: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        
        h1 {
            font-size: 1.8em;
            margin-bottom: 8px;
            background: linear-gradient(to right, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .subtitle {
            color: var(--muted);
            font-size: 0.9em;
        }
        
        .card {
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .card-title {
            font-size: 1.2em;
            font-weight: 600;
        }
        
        .stats {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.5em;
            font-weight: 700;
            display: block;
        }
        
        .stat-label {
            font-size: 0.9em;
            color: var(--muted);
        }
        
        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        
        .input-group input,
        .input-group select,
        .input-group button {
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background-color: var(--surface2);
            color: var(--text);
            font-family: var(--font-sans);
            font-size: 1em;
        }
        
        .input-group input:focus,
        .input-group select:focus,
        .input-group button:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.2);
        }
        
        .input-group button {
            background-color: var(--accent);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s;
        }
        
        .input-group button:hover {
            background-color: var(--accent2);
        }
        
        .food-list {
            margin-top: 16px;
        }
        
        .food-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid var(--border2);
        }
        
        .food-item:last-child {
            border-bottom: none;
        }
        
        .food-name {
            font-weight: 600;
            flex-grow: 1;
            margin-right: 12px;
        }
        
        .food-calories {
            font-family: var(--font-mono);
            font-weight: 600;
        }
        
        .food-actions {
            display: flex;
            gap: 8px;
        }
        
        .btn-sm {
            padding: 6px 12px;
            font-size: 0.9em;
        }
        
        .btn-delete {
            background-color: var(--error);
            color: white;
        }
        
        .btn-delete:hover {
            background-color: #ff7b72;
        }
        
        .empty-state {
            text-align: center;
            color: var(--muted);
            padding: 32px 16px;
            font-style: italic;
        }
        
        .today-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .date-selector {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .nav-btn {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 1.2em;
            cursor: pointer;
            padding: 4px 8px;
        }
        
        .nav-btn:hover {
            opacity: 0.8;
        }
        
        .current-date {
            font-weight: 600;
            min-width: 100px;
            text-align: center;
        }
        
        .tip {
            background-color: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            margin-top: 16px;
            font-size: 0.9em;
            color: var(--muted);
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 12px;
            }
            
            .input-group {
                flex-direction: column;
            }
            
            .input-group input,
            .input-group select,
            .input-group button {
                width: 100%;
            }
            
            .today-info {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Calorie Tracker</h1>
            <p class="subtitle">Track your daily nutrition on iPhone</p>
        </header>
        
        <div class="today-info">
            <div class="date-selector">
                <button class="nav-btn" id="prevDate">◀</button>
                <span class="current-date" id="currentDate">Today</span>
                <button class="nav-btn" id="nextDate">▶</button>
            </div>
            <div>
                <span id="totalCalories" class="stat-value">0</span> kcal today
            </div>
        </div>
        
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">Add Food</h2>
            </div>
            
            <div class="input-group">
                <input type="text" id="foodName" placeholder="Food name (e.g., apple, chicken breast)" autocomplete="off">
                <input type="number" id="calories" placeholder="Calories" min="0" step="1">
                <select id="mealType">
                    <option value="breakfast">Breakfast</option>
                    <option value="lunch">Lunch</option>
                    <option value="dinner">Dinner</option>
                    <option value="snack">Snack</option>
                </select>
                <button id="addFoodBtn">Add</button>
            </div>
            
            <div class="food-list" id="foodList">
                <!-- Food items will be inserted here -->
            </div>
            
            <div class="empty-state" id="emptyState">
                No foods logged for today. Add your first meal above!
            </div>
        </div>
        
        <div class="tip">
            💡 Tap on any food item to edit or delete it. Your data is saved locally on your iPhone and persists between sessions.
        </div>
    </div>

    <script>
        // Calorie Tracker - Local Storage Based
        // Works offline on iPhone Safari
        
        const STORAGE_KEY = 'calorieTrackerData';
        const DEFAULT_FOODS = [
            { name: 'Apple', calories: 95 },
            { name: 'Banana', calories: 105 },
            { name: 'Chicken Breast (100g)', calories: 165 },
            { name: 'Rice (1 cup cooked)', calories: 205 },
            { name: 'Egg (large)', calories: 78 },
            { name: 'Greek Yogurt (1 cup)', calories: 130 },
            { name: 'Almonds (1 oz)', calories: 164 },
            { name: 'Salmon (100g)', calories: 208 },
            { name: 'Broccoli (1 cup)', calories: 55 },
            { name: 'Brown Rice (1 cup)', calories: 216 },
            { name: 'Oatmeal (1 cup cooked)', calories: 154 },
            { name: 'Peanut Butter (2 tbsp)', calories: 188 },
            { name: 'Whole Wheat Bread (2 slices)', calories: 160 },
            { name: 'Milk (1 cup)', calories: 103 },
            { name: 'Orange', calories: 62 }
        ];
        
        let foods = [];
        let selectedDate = new Date();
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            render();
            setupEventListeners();
        });
        
        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    if (parsed && Array.isArray(parsed.foods)) {
                        foods = parsed.foods;
                    }
                    if (parsed && parsed.selectedDate) {
                        selectedDate = new Date(parsed.selectedDate);
                    }
                } catch (e) {
                    console.error('Failed to parse calorie data:', e);
                    foods = [];
                }
            }
        }
        
        function saveData() {
            const data = {
                foods: foods,
                selectedDate: selectedDate.toISOString()
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }
        
        function getDateKey(date) {
            return date.toISOString().split('T')[0]; // YYYY-MM-DD
        }
        
        function getFoodsForDate(date) {
            const dateKey = getDateKey(date);
            return foods.filter(item => getDateKey(new Date(item.timestamp)) === dateKey);
        }
        
        function addFood(name, calories, mealType) {
            const foodItem = {
                id: Date.now() + Math.random(),
                name: name.trim(),
                calories: parseFloat(calories) || 0,
                mealType: mealType || 'snack',
                timestamp: new Date().toISOString()
            };
            
            foods.push(foodItem);
            saveData();
            render();
        }
        
        function deleteFood(id) {
            foods = foods.filter(item => item.id !== id);
            saveData();
            render();
        }
        
        function editFood(id, updates) {
            const index = foods.findIndex(item => item.id === id);
            if (index !== -1) {
                foods[index] = { ...foods[index], ...updates };
                saveData();
                render();
            }
        }
        
        function getTotalCalories(date) {
            return getFoodsForDate(date).reduce((sum, item) => sum + item.calories, 0);
        }
        
        function formatDate(date) {
            return new Date(date).toLocaleDateString(undefined, {
                weekday: 'short',
                month: 'short',
                day: 'numeric'
            });
        }
        
        function setupEventListeners() {
            const foodNameInput = document.getElementById('foodName');
            const caloriesInput = document.getElementById('calories');
            const mealTypeSelect = document.getElementById('mealType');
            const addFoodBtn = document.getElementById('addFoodBtn');
            const prevDateBtn = document.getElementById('prevDate');
            const nextDateBtn = document.getElementById('nextDate');
            const currentDateSpan = document.getElementById('currentDate');
            const totalCaloriesSpan = document.getElementById('totalCalories');
            const foodList = document.getElementById('foodList');
            const emptyState = document.getElementById('emptyState');
            
            // Add food
            addFoodBtn.addEventListener('click', () => {
                const name = foodNameInput.value.trim();
                const calories = caloriesInput.value;
                
                if (!name) {
                    alert('Please enter a food name');
                    foodNameInput.focus();
                    return;
                }
                
                if (!calories || isNaN(calories) || parseFloat(calories) < 0) {
                    alert('Please enter valid calories');
                    caloriesInput.focus();
                    return;
                }
                
                addFood(name, calories, mealTypeSelect.value);
                
                // Clear inputs
                foodNameInput.value = '';
                caloriesInput.value = '';
                mealTypeSelect.selectedIndex = 0;
                foodNameInput.focus();
            });
            
            // Enter key to add food
            foodNameInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    caloriesInput.focus();
                }
            });
            
            caloriesInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    addFoodBtn.click();
                }
            });
            
            // Date navigation
            prevDateBtn.addEventListener('click', () => {
                selectedDate = new Date(selectedDate);
                selectedDate.setDate(selectedDate.getDate() - 1);
                render();
            });
            
            nextDateBtn.addEventListener('click', () => {
                selectedDate = new Date(selectedDate);
                selectedDate.setDate(selectedDate.getDate() + 1);
                render();
            });
            
            // Food list events (using event delegation)
            foodList.addEventListener('click', (e) => {
                const foodItem = e.target.closest('.food-item');
                if (!foodItem) return;
                
                const foodId = parseInt(foodItem.dataset.id);
                
                if (e.target.classList.contains('edit-btn')) {
                    const food = foods.find(item => item.id === foodId);
                    if (food) {
                        const newName = prompt('Edit food name:', food.name);
                        if (newName !== null && newName.trim() !== '') {
                            const newCalories = prompt('Edit calories:', food.calories);
                            if (newCalories !== null && !isNaN(newCalories) && parseFloat(newCalories) >= 0) {
                                editFood(foodId, { 
                                    name: newName.trim(), 
                                    calories: parseFloat(newCalories) 
                                });
                            }
                        }
                    }
                }
                
                if (e.target.classList.contains('delete-btn')) {
                    if (confirm('Delete this food item?')) {
                        deleteFood(foodId);
                    }
                }
            });
        }
        
        function render() {
            // Update date display
            const currentDateSpan = document.getElementById('currentDate');
            currentDateSpan.textContent = formatDate(selectedDate);
            
            // Update total calories
            const totalCaloriesSpan = document.getElementById('totalCalories');
            const total = getTotalCalories(selectedDate);
            totalCaloriesSpan.textContent = Math.round(total);
            
            // Update food list
            const foodList = document.getElementById('foodList');
            const emptyState = document.getElementById('emptyState');
            
            const todaysFoods = getFoodsForDate(selectedDate);
            
            if (todaysFoods.length === 0) {
                foodList.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }
            
            emptyState.style.display = 'none';
            
            foodList.innerHTML = todaysFoods.map(food => {
                const date = new Date(food.timestamp);
                const timeStr = date.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
                
                return `
                    <div class="food-item" data-id="${food.id}">
                        <div class="food-name">
                            <strong>${food.name}</strong>
                            <br>
                            <small>${timeStr} • ${food.mealType}</small>
                        </div>
                        <div class="food-calories">${Math.round(food.calories)} kcal</div>
                        <div class="food-actions">
                            <button class="btn-sm edit-btn">Edit</button>
                            <button class="btn-sm btn-delete">Delete</button>
                        </div>
                    </div>
                `).join('');
            }
        }
    </script>
</body>
</html>
